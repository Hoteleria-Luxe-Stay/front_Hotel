<main class="min-h-screen bg-slate-900 flex items-center justify-center px-6 py-12">
  <section class="w-full max-w-md">
    <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-8">
      <header class="text-center mb-6">
        <h1 class="text-2xl font-serif text-white">Nueva contraseña</h1>
        <p class="text-sm text-gray-400 mt-2">Crea una contraseña segura</p>
      </header>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña nueva</label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 pr-10 py-3 bg-slate-700/50 border text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50 border-slate-600"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-amber-400 transition-colors"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword()) {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.58 10.58a2 2 0 102.83 2.83" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.88 5.09A9.95 9.95 0 0112 5c5 0 9 4 10 7a11.84 11.84 0 01-4.29 5.19M6.23 6.23C4.28 7.53 2.88 9.53 2 12c1 3 5 7 10 7a9.96 9.96 0 004.17-.91" />
                </svg>
              } @else {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
                </svg>
              }
            </button>
          </div>
          @if (passwordField?.invalid && passwordField?.touched) {
            <p class="text-sm text-red-400 mt-2">Mínimo 8 caracteres</p>
          }
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Confirmar contraseña</label>
          <div class="relative">
            <input
              [type]="showConfirmPassword() ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="••••••••"
              class="w-full px-4 pr-10 py-3 bg-slate-700/50 border text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50 border-slate-600"
            />
            <button
              type="button"
              (click)="toggleConfirmPasswordVisibility()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-amber-400 transition-colors"
              [attr.aria-label]="showConfirmPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showConfirmPassword()) {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.58 10.58a2 2 0 102.83 2.83" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.88 5.09A9.95 9.95 0 0112 5c5 0 9 4 10 7a11.84 11.84 0 01-4.29 5.19M6.23 6.23C4.28 7.53 2.88 9.53 2 12c1 3 5 7 10 7a9.96 9.96 0 004.17-.91" />
                </svg>
              } @else {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
                </svg>
              }
            </button>
          </div>
          @if (confirmPasswordField?.invalid && confirmPasswordField?.touched) {
            <p class="text-sm text-red-400 mt-2">Repite la contraseña</p>
          }
        </div>

        @if (hasError()) {
          <div class="bg-red-500/10 border border-red-500/30 text-red-300 px-4 py-2 rounded-lg text-sm">
            {{ errorMessage() }}
          </div>
        }

        <button
          type="submit"
          [disabled]="isPosting()"
          class="w-full bg-amber-500 text-slate-900 font-semibold py-3 rounded-lg hover:bg-amber-400 transition-colors disabled:opacity-60"
        >
          @if (isPosting()) {
            Guardando...
          } @else {
            Resetear contraseña
          }
        </button>
      </form>

      <div class="text-center mt-6">
        <a routerLink="/auth/login" class="text-amber-400 text-sm hover:text-amber-300">Volver a iniciar sesión</a>
      </div>
    </div>
  </section>
</main>
